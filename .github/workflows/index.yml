name: Update index.html

on:
  push:
    branches:
      - gh-pages

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup git
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

      - name: Update index.html
        run: |
          new_version=$(git tag -l | sort -V | tail -n 1)
          sed -i 's|url=https://cocoa-beans.apartium.net/|url=https://cocoa-beans.apartium.net/'"$new_version"'/|' "index.html"