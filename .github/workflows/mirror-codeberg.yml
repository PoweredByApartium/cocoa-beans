name: Mirror to Codeberg

on:
  push:
    branches:
      - main
    tags:
      - '**'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CODEBERG_SSH_KEY }}

      - name: Add Codeberg to known hosts
        run: ssh-keyscan codeberg.org >> ~/.ssh/known_hosts

      - name: Push mirror to Codeberg
        run: |
          git remote add codeberg git@codeberg.org:Apartium/cocoa-beans.git
          git push --mirror codeberg
